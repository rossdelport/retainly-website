<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Retainly</title>
  <link rel="icon" type="image/png" href="uploads/pink retainly flavicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Barlow', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #faf9f9;
      background-image:
        radial-gradient(ellipse at 0% 100%, rgba(255,59,127,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 100% 0%, rgba(255,59,127,0.12) 0%, transparent 50%);
    }
    a { text-decoration: none; }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      padding: 48px 44px 40px;
      width: 100%; max-width: 400px;
      margin: 24px;
    }
    .logo-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 28px;
    }
    .logo-wrap img { width: 34px; height: 34px; object-fit: contain; }
    .logo-wrap span { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #0a0a0a; }
    h1 {
      font-size: 22px; font-weight: 700; letter-spacing: -0.4px;
      color: #0a0a0a; text-align: center; margin: 0 0 6px;
    }
    .sub {
      font-size: 14.5px; color: #8a8a8a; text-align: center;
      margin: 0 0 32px; font-weight: 400;
    }
    label {
      display: block; font-size: 13.5px; font-weight: 600;
      color: #0a0a0a; margin-bottom: 7px;
    }
    .input-wrap { position: relative; margin-bottom: 18px; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 12px 16px;
      border: 1px solid #e4e4e4; border-radius: 10px;
      font-family: 'Barlow', sans-serif; font-size: 15px; color: #0a0a0a;
      background: #fff; outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }
    input:focus {
      border-color: #FF3B7F;
      box-shadow: 0 0 0 3px rgba(255,59,127,0.1);
    }
    input::placeholder { color: #c0c0c0; }
    .eye-btn {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      padding: 4px; color: #aaa; display: flex; align-items: center;
      transition: color 150ms;
    }
    .eye-btn:hover { color: #555; }
    .row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .remember {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; color: #5a5a5a; font-weight: 500; cursor: pointer;
    }
    .remember input[type="checkbox"] {
      width: 16px; height: 16px; margin: 0; padding: 0;
      accent-color: #FF3B7F; cursor: pointer;
      border-radius: 4px;
    }
    .forgot { font-size: 14px; font-weight: 600; color: #FF3B7F; }
    .forgot:hover { color: #e8306e; }
    .btn-signin {
      width: 100%; padding: 14px;
      background: #FF3B7F; color: #fff;
      border: none; border-radius: 999px;
      font-family: 'Barlow', sans-serif; font-size: 15.5px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.1px;
      transition: background 180ms ease, transform 120ms ease, box-shadow 180ms ease;
      box-shadow: 0 4px 16px rgba(255,59,127,0.3);
    }
    .btn-signin:hover { background: #e8306e; box-shadow: 0 6px 20px rgba(255,59,127,0.4); }
    .btn-signin:active { transform: scale(0.98); }
    .btn-signin:disabled { background: #f0a0bc; box-shadow: none; cursor: not-allowed; }
    .signup-row {
      text-align: center; margin-top: 22px;
      font-size: 14px; color: #8a8a8a; font-weight: 400;
    }
    .signup-row a { color: #FF3B7F; font-weight: 600; }
    .signup-row a:hover { color: #e8306e; }
    .error-msg {
      display: none; background: #fff0f5; border: 1px solid #FFB3CC;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13.5px; color: #e8306e; font-weight: 500;
      margin-bottom: 16px; text-align: center;
    }
    .spinner {
      display: none; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <a href="index.html" style="display:flex;align-items:center;gap:10px;">
        <img src="retainly-logo.png" alt="Retainly" />
        <span>Retainly</span>
      </a>
    </div>

    <h1>Welcome back</h1>
    <p class="sub">Please enter your details to sign in.</p>

    <div class="error-msg" id="errorMsg">Incorrect email or password. Please try again.</div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <label for="email">Email</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="Enter your email" required />
      </div>

      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter your password" required />
        <button type="button" class="eye-btn" onclick="togglePassword()" id="eyeBtn" aria-label="Toggle password">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" id="remember" />
          Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-signin" id="submitBtn">
        <span id="btnText">Sign in</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>

    <p class="signup-row">Don't have an account? <a href="contact.html">Sign up</a></p>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.innerHTML = isHidden
        ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');

      errorMsg.style.display = 'none';

      if (!email || !password) {
        errorMsg.textContent = 'Please enter your email and password.';
        errorMsg.style.display = 'block';
        return;
      }

      // Show loading state
      btn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';

      // Simulate auth — swap this for a real API call
      setTimeout(() => {
        btn.disabled = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
        errorMsg.textContent = 'Incorrect email or password. Please try again.';
        errorMsg.style.display = 'block';
      }, 1400);
    }
  </script>
</body>
</html>
