<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Retainly</title>
  <link rel="icon" type="image/png" href="uploads/pink retainly flavicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'Barlow', -apple-system, system-ui, sans-serif;
      background: #ffffff; color: #0a0a0a;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    header {
      padding: 20px 32px;
      border-bottom: 0.5px solid #ececec;
      display: flex; align-items: center; gap: 10px;
    }
    header img { width: 30px; height: 30px; object-fit: contain; display: block; }
    header span { font-size: 19px; font-weight: 700; letter-spacing: -0.5px; }
    main {
      max-width: 560px; margin: 60px auto 120px;
      padding: 0 32px;
    }
    h1 { font-size: 42px; font-weight: 800; letter-spacing: -1.2px; line-height: 1.05; margin: 0 0 12px; }
    .sub { font-size: 17px; color: #5a5a5a; line-height: 1.5; margin-bottom: 48px; }
    label {
      display: block; font-size: 13.5px; font-weight: 600;
      color: #0a0a0a; margin-bottom: 7px; letter-spacing: 0.1px;
    }
    input, textarea {
      width: 100%; padding: 13px 16px;
      border: 1px solid #e0e0e0; border-radius: 10px;
      font-family: 'Barlow', sans-serif; font-size: 15px; color: #0a0a0a;
      background: #fff; outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
      margin-bottom: 20px;
    }
    input:focus, textarea:focus {
      border-color: #FF3B7F;
      box-shadow: 0 0 0 3px rgba(255, 59, 127, 0.1);
    }
    input::placeholder, textarea::placeholder { color: #b0b0b0; }
    textarea { resize: vertical; min-height: 130px; }
    button {
      width: 100%; padding: 15px;
      background: #FF3B7F; color: #fff;
      border: none; border-radius: 999px;
      font-family: 'Barlow', sans-serif; font-size: 15.5px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.1px;
      transition: background 180ms ease, transform 120ms ease;
    }
    button:hover { background: #e8306e; }
    button:active { transform: scale(0.98); }
    .success {
      display: none; margin-top: 24px; padding: 16px 20px;
      background: #fff0f5; border: 1px solid #FFB3CC;
      border-radius: 10px; font-size: 15px; font-weight: 500; color: #FF3B7F;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" style="display:flex;align-items:center;gap:10px;">
      <img src="retainly-logo.png" alt="Retainly" />
      <span>Retainly</span>
    </a>
  </header>
  <main>
    <h1>Get in touch</h1>
    <p class="sub">Have a question or want to see Retainly in action? Fill in the form and we'll get back to you within one business day.</p>

    <form id="contactForm" onsubmit="handleSubmit(event)">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" placeholder="Jane Smith" required />

      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="jane@myclinic.com" required />

      <label for="phone">Phone number</label>
      <input type="tel" id="phone" name="phone" placeholder="+1 555 000 0000" />

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Tell us about your clinic and what you're looking for…" required></textarea>

      <button type="submit">Send message</button>
    </form>

    <div class="success" id="successMsg">
      ✓ Message sent! We'll be in touch within one business day.
    </div>
  </main>
  <footer style="border-top: 1px solid #ececec; padding: 32px 32px 48px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; font-size: 13px; color: #9a9a9a; font-family: 'Barlow', sans-serif;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <img src="retainly-logo.png" alt="Retainly" style="width: 24px; height: 24px; object-fit: contain;" />
      <span style="color: #0a0a0a; font-weight: 700;">Retainly</span>
      <span style="margin-left: 12px;">© 2026 Retainly Inc.</span>
    </div>
    <div style="display: flex; gap: 22px;">
      <a href="privacy.html" style="color: inherit; text-decoration: none;">Privacy</a>
      <a href="terms.html" style="color: inherit; text-decoration: none;">Terms</a>
      <a href="security.html" style="color: inherit; text-decoration: none;">Security</a>
      <a href="contact.html" style="color: inherit; text-decoration: none;">Contact</a>
    </div>
  </footer>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const form = document.getElementById('contactForm');
      const success = document.getElementById('successMsg');
      form.style.display = 'none';
      success.style.display = 'block';
    }
  </script>
</body>
</html>
